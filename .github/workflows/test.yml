name: Traktr CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          find src/ -name '*.sh' -exec shellcheck -x -s bash {} +
          shellcheck -x -s bash plugins/example_plugin.sh || true

  test:
    name: Integration Test (DVWA)
    runs-on: ubuntu-latest
    needs: lint
    services:
      dvwa:
        image: vulnerables/web-dvwa
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -f http://localhost/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
      - name: Setup DVWA
        run: |
          # Wait for DVWA to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ && break
            sleep 2
          done
          # Auto-setup DVWA database
          curl -sf -X POST http://localhost:8080/setup.php \
            -d "create_db=Create+%2F+Reset+Database" || true
      - name: Run Traktr smoke test
        run: |
          chmod +x src/core/traktr.sh
          # Test flag parsing (dry-run mode)
          bash src/core/traktr.sh http://localhost:8080 --dry-run || true
          echo "Smoke test completed"
      - name: Validate script syntax
        run: |
          for f in src/**/*.sh; do
            bash -n "$f" && echo "OK: $f" || echo "FAIL: $f"
          done

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: traktr:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
