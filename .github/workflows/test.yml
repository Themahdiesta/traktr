name: Traktr CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          find src/ -name '*.sh' -exec shellcheck -x -s bash --severity=error {} +
          shellcheck -x -s bash plugins/example_plugin.sh || true

  install-dryrun:
    name: Installer Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check all scripts
        run: |
          for f in $(find src/ -name '*.sh'); do
            bash -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done
          bash -n install.sh
      - name: Dry-run installer
        run: bash install.sh --dry-run

  install-real:
    name: Full Install Test
    runs-on: ubuntu-latest
    needs: [lint, install-dryrun]
    steps:
      - uses: actions/checkout@v4
      - name: Run full installer
        run: |
          chmod +x install.sh
          bash install.sh 2>&1 | tee /tmp/install.log
        timeout-minutes: 25
      - name: Health check
        run: bash src/core/installer.sh --check
        continue-on-error: true
      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: logs/install.log

  test:
    name: Integration Test (DVWA)
    runs-on: ubuntu-latest
    needs: lint
    services:
      dvwa:
        image: ghcr.io/digininja/dvwa:latest
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -f http://localhost/ || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
      - name: Setup DVWA
        run: |
          # Wait for DVWA to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ && break
            sleep 2
          done
          # Auto-setup DVWA database
          curl -sf -X POST http://localhost:8080/setup.php \
            -d "create_db=Create+%2F+Reset+Database" || true
      - name: Run Traktr smoke test
        run: |
          chmod +x src/core/traktr.sh
          # Test flag parsing (dry-run mode)
          bash src/core/traktr.sh http://localhost:8080 --dry-run || true
          echo "Smoke test completed"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: traktr:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
